openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: youtube
    description: YouTube search
  - name: queue
    description: Shared music queue
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /youtube/search:
    get:
      operationId: searchYoutube
      tags: [youtube]
      summary: Search YouTube videos
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YoutubeResult"
        "400":
          description: Missing query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: YouTube API failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /queue:
    get:
      operationId: getQueue
      tags: [queue]
      summary: Get the shared queue, ordered by position
      responses:
        "200":
          description: Queue songs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueSong"
    post:
      operationId: addQueueSong
      tags: [queue]
      summary: Add a song to the end of the queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueSongInput"
      responses:
        "201":
          description: Song added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueSong"
        "400":
          description: Invalid song data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /queue/{id}:
    delete:
      operationId: removeQueueSong
      tags: [queue]
      summary: Remove a song from the queue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /queue/reorder:
    patch:
      operationId: reorderQueue
      tags: [queue]
      summary: Reorder the queue by supplying the full list of ids in the new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueReorderInput"
      responses:
        "200":
          description: Reordered queue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueSong"
        "400":
          description: Invalid reorder payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResult:
      type: object
      properties:
        success:
          type: boolean
        username:
          type: string
        token:
          type: string
      required:
        - success
        - username
        - token

    MeResult:
      type: object
      properties:
        username:
          type: string
      required:
        - username

    YoutubeResult:
      type: object
      properties:
        videoId:
          type: string
        title:
          type: string
        channel:
          type: string
        thumbnail:
          type: string
        duration:
          type: ["string", "null"]
        publishedAt:
          type: string
      required:
        - videoId
        - title
        - channel
        - thumbnail
        - duration
        - publishedAt

    QueueSong:
      type: object
      properties:
        id:
          type: integer
        videoId:
          type: string
        title:
          type: string
        channel:
          type: string
        thumbnail:
          type: string
        duration:
          type: string
        addedAt:
          type: number
        position:
          type: integer
      required:
        - id
        - videoId
        - title
        - channel
        - thumbnail
        - duration
        - addedAt
        - position

    QueueSongInput:
      type: object
      properties:
        videoId:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        channel:
          type: string
          minLength: 1
        thumbnail:
          type: string
        duration:
          type: string
      required:
        - videoId
        - title
        - channel
        - thumbnail
        - duration

    QueueReorderInput:
      type: object
      properties:
        orderedIds:
          type: array
          items:
            type: integer
      required:
        - orderedIds
